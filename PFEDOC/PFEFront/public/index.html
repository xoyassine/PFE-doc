<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#000000" />
    <meta name="description" content="MonCabinet - Tableau de bord médical" />
    <link rel="apple-touch-icon" href="logo192.png" />
    <!-- Google Fonts: Plus Jakarta Sans -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <!-- Material Symbols -->
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
    <!-- Tailwind CDN (runtime) with forms + container-queries plugins -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <style>
      .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
      .fill-icon { font-variation-settings: 'FILL' 1; }
      ::-webkit-scrollbar { width: 6px; }
      ::-webkit-scrollbar-track { background: #f8f9ff; }
      ::-webkit-scrollbar-thumb { background: #bbcabf; border-radius: 12px; }
      ::-webkit-scrollbar-thumb:hover { background: #6c7a71; }
    </style>
    <script id="tailwind-config">
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              primary: '#006c49',
              background: '#f8f9ff',
              'on-surface': '#121c2a',
              'on-surface-variant': '#3c4a42',
              'surface': '#f8f9ff',
              'surface-container-lowest': '#ffffff',
              'surface-container-high': '#dee9fc',
              'primary-container': '#10b981',
              'secondary-container': '#8cf5b2',
              'outline-variant': '#bbcabf',
              'tertiary-container': '#71af97',
            },
            spacing: {
              'sm': '12px','md':'24px','lg':'48px','xl':'80px','margin-desktop':'40px','margin-mobile':'16px','container-max':'1440px'
            },
            fontFamily: { body: ['Plus Jakarta Sans', 'sans-serif'] }
          }
        }
      };
    </script>
    <!--
      manifest.json provides metadata used when your web app is installed on a
      user's mobile device or desktop. See https://developers.google.com/web/fundamentals/web-app-manifest/
    -->
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
    <!--
      Notice the use of %PUBLIC_URL% in the tags above.
      It will be replaced with the URL of the `public` folder during the build.
      Only files inside the `public` folder can be referenced from the HTML.

      Unlike "/favicon.ico" or "favicon.ico", "%PUBLIC_URL%/favicon.ico" will
      work correctly both with client-side routing and a non-root public URL.
      Learn how to configure a non-root public URL by running `npm run build`.
    -->
    <title>MonCabinet - Tableau de Bord</title>
  </head>
  <body class="bg-background text-on-surface font-body overflow-x-hidden min-h-screen">
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
    <!--
      This HTML file is a template.
      If you open it directly in the browser, you will see an empty page.

      You can add webfonts, meta tags, or analytics to this file.
      The build step will place the bundled scripts into the <body> tag.

      To begin the development, run `npm start` or `yarn start`.
      To create a production bundle, use `npm run build` or `yarn build`.
    -->
  </body>
</html>
